name: Update GitHub Analytics

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-github-analytics
  cancel-in-progress: true

jobs:
  generate:
    name: Generate GitHub analytics
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out profile repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Validate source compatibility contracts
        shell: bash
        run: |
          set -euo pipefail

          node --check scripts/generate-engineering-analytics.mjs
          node --check scripts/ai-engineering-analytics.mjs
          node --check scripts/github-analytics-config.mjs
          node --check scripts/update-readme-analytics.mjs
          node scripts/github-analytics-config.mjs --validate
          node scripts/generate-engineering-analytics.mjs --self-test-summary-cards
          node scripts/generate-engineering-analytics.mjs --self-test-data-pipeline

      - name: Generate engineering analytics through the local Action
        id: analytics
        uses: ./
        with:
          config-path: .github/github-analytics.config.mjs
          include-private: "true"
          output-directory: assets
          readme-path: README.md
          update-readme: "true"
          insert-readme-markers: "false"
          attribution: "false"
          strict-mode: "true"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
          REPOSITORY_AFFILIATIONS: owner,collaborator,organization_member
          MAX_REPOSITORIES: "500"
          MAX_PUBLIC_CONTRIBUTED_REPOSITORIES: "100"
          MAX_PUBLIC_CONTRIBUTION_SEARCH_CANDIDATES: "500"
          MAX_PUBLIC_CONTRIBUTORS_PER_REPOSITORY: "1000"
          MAX_PULL_REQUESTS_PER_PUBLIC_REPOSITORY: "2000"
          GITHUB_REQUEST_TIMEOUT_MS: "60000"
          PULL_REQUEST_REVIEW_CONCURRENCY: "4"
          REPOSITORY_CONCURRENCY: "3"
          MANIFEST_CONCURRENCY: "2"
          MAX_MANIFEST_FILES_PER_REPOSITORY: "80"
          CODE_ACTIVITY_YEARS: "10"
          MAX_COMMITS_PER_REPOSITORY: "250"
          MAX_ANALYZED_COMMITS: "2500"
          COMMIT_LIST_CONCURRENCY: "2"
          COMMIT_DETAIL_CONCURRENCY: "3"
          INCLUDE_ARCHIVED_REPOSITORIES: "true"
          INCLUDE_FORKED_REPOSITORIES: "false"
          MIN_SCAN_SUCCESS_RATIO: "1"
          DEBUG_PRIVATE_REPOSITORIES: "false"

      - name: Commit and push refreshed analytics
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- assets README.md

          if git diff --cached --quiet; then
            echo "Analytics and README are unchanged. Nothing to commit."
            exit 0
          fi

          git commit -m "chore(stats): refresh GitHub analytics"
          if ! git push; then
            echo "Initial push failed. Rebasing onto the latest branch..."
            git pull --rebase
            git push
          fi
