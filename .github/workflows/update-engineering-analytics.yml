name: Update GitHub Analytics

on:
  schedule:
    # Runs daily at 02:17 UTC.
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-github-analytics
  cancel-in-progress: true

# Repository identity and generated-directory paths are centralized here so
# every workflow step uses the same configuration.
env:
  ANALYTICS_CONFIG_FILE: .github/github-analytics.config.mjs
  ANALYTICS_STAGING_DIRECTORY: generated-analytics
  ANALYTICS_ASSET_DIRECTORY: assets

jobs:
  generate:
    name: Generate GitHub analytics
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate scripts and user configuration
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_MODULES=(
            "scripts/generate-engineering-analytics.mjs"
            "scripts/update-readme-analytics.mjs"
            "scripts/ai-engineering-analytics.mjs"
            "scripts/github-analytics-config.mjs"
            "scripts/manage-analytics-assets.mjs"
            "$ANALYTICS_CONFIG_FILE"
          )

          for module in "${REQUIRED_MODULES[@]}"; do
            if [ ! -f "$module" ]; then
              echo "::error::$module is missing from the repository."
              exit 1
            fi

            node --check "$module"
            echo "Syntax validated: $module"
          done

          # Performs semantic validation after syntax validation:
          # username format, aliases, and repository exclusions.
          node scripts/github-analytics-config.mjs --validate

          # Exercises the locked 760×360 renderers with non-production fixture
          # values. This requires no token and proves dynamic interpolation,
          # XML safety, and summary-metric invariants before API work begins.
          node scripts/generate-engineering-analytics.mjs \
            --self-test-summary-cards

          # Exercises v20's data accuracy contract without network access:
          # alias attribution, Python/Jupyter classification, Linguist-byte
          # aggregation, PR deduplication, and structured API diagnostics.
          node scripts/generate-engineering-analytics.mjs \
            --self-test-data-pipeline

      - name: Reset generated asset directories
        shell: bash
        run: |
          set -euo pipefail

          # assets/ is generated-only. Remove its complete previous contents at
          # workflow start so no stale or unrelated file can survive this run.
          #
          # generated-analytics/ is a clean staging area. Nothing is published
          # from it until the complete expected SVG set passes validation.
          node scripts/manage-analytics-assets.mjs reset

      - name: Validate private GitHub token
        shell: bash
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PRIVATE_STATS_TOKEN:-}" ]; then
            echo "::error::PRIVATE_STATS_TOKEN is missing."
            exit 1
          fi

          PROFILE_USERNAME=$(
            node scripts/github-analytics-config.mjs \
              --print-profile-username
          )

          STATUS=$(
            curl \
              --silent \
              --show-error \
              --output /tmp/github-user.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $PRIVATE_STATS_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/user
          )

          if [ "$STATUS" != "200" ]; then
            echo "::error::GitHub rejected PRIVATE_STATS_TOKEN with HTTP $STATUS."
            cat /tmp/github-user.json
            exit 1
          fi

          AUTHENTICATED_LOGIN=$(
            node -e \
              "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/github-user.json','utf8')); process.stdout.write(data.login ?? '')"
          )

          if [ "${AUTHENTICATED_LOGIN,,}" != "${PROFILE_USERNAME,,}" ]; then
            echo "::error::PRIVATE_STATS_TOKEN belongs to '$AUTHENTICATED_LOGIN', not '$PROFILE_USERNAME'."
            exit 1
          fi

          echo "GitHub authentication succeeded for $AUTHENTICATED_LOGIN."

      - name: Generate analytics into clean staging
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
          # github.token is created automatically for this workflow. It is not
          # a second user-managed secret and is used only for public scope.
          PUBLIC_GITHUB_TOKEN: ${{ github.token }}

          # Includes personal repositories available to the token and public
          # repositories linked to configured contributor identities.
          REPOSITORY_AFFILIATIONS: owner,collaborator,organization_member
          MAX_REPOSITORIES: "500"
          MAX_PUBLIC_CONTRIBUTED_REPOSITORIES: "100"
          MAX_PULL_REQUESTS_PER_PUBLIC_REPOSITORY: "2000"
          PULL_REQUEST_REVIEW_CONCURRENCY: "4"
          REPOSITORY_CONCURRENCY: "3"
          MANIFEST_CONCURRENCY: "2"
          MAX_MANIFEST_FILES_PER_REPOSITORY: "80"

          CODE_ACTIVITY_YEARS: "10"
          # Caps are correctness guards: reaching one fails the run rather
          # than publishing partial personal-code totals.
          MAX_COMMITS_PER_REPOSITORY: "250"
          MAX_ANALYZED_COMMITS: "2500"
          COMMIT_LIST_CONCURRENCY: "2"
          COMMIT_DETAIL_CONCURRENCY: "3"

          INCLUDE_ARCHIVED_REPOSITORIES: "true"
          INCLUDE_FORKED_REPOSITORIES: "false"
          # Summary quality percentages are published only when every selected
          # repository scan succeeds; partial scans would skew the card.
          MIN_SCAN_SUCCESS_RATIO: "1"

          OUTPUT_DIRECTORY: generated-analytics
          DEBUG_PRIVATE_REPOSITORIES: "false"
        run: |
          set -euo pipefail

          # The reset step created an empty staging directory. The generator
          # writes the complete replacement set there and never writes directly
          # to the repository's published assets directory.
          node scripts/generate-engineering-analytics.mjs

      - name: Validate complete generated asset set
        shell: bash
        run: |
          set -euo pipefail

          # Exact-set validation rejects missing cards, unexpected files,
          # malformed SVG output, empty files, and potential secret material.
          node scripts/manage-analytics-assets.mjs validate-staging

      - name: Publish newly generated assets
        shell: bash
        run: |
          set -euo pipefail

          # Publication copies the validated set into a temporary sibling
          # directory, validates it again, and then replaces assets/ through a
          # directory rename. The resulting assets/ directory is entirely new.
          node scripts/manage-analytics-assets.mjs publish

          echo "Fresh generated assets:"
          find "$ANALYTICS_ASSET_DIRECTORY" \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort

      - name: Replace profile README analytics section
        shell: bash
        env:
          README_FILE: README.md
        run: |
          set -euo pipefail

          # The updater owns presentation order and duplicate removal. It reads
          # only the freshly published assets when calculating cache hashes.
          node scripts/update-readme-analytics.mjs

          START_COUNT=$(
            grep -Fc \
              "<!-- ENGINEERING_ANALYTICS:START -->" \
              README.md \
              || true
          )
          END_COUNT=$(
            grep -Fc \
              "<!-- ENGINEERING_ANALYTICS:END -->" \
              README.md \
              || true
          )

          if [ "$START_COUNT" -ne 1 ] || [ "$END_COUNT" -ne 1 ]; then
            echo "::error::README.md must contain exactly one managed analytics block."
            exit 1
          fi

          mapfile -t REQUIRED_ASSETS < <(
            node scripts/manage-analytics-assets.mjs list
          )

          for filename in "${REQUIRED_ASSETS[@]}"; do
            reference="assets/$filename"
            COUNT=$(
              grep -Fo "$reference" README.md \
                | wc -l \
                || true
            )
            COUNT=$(
              echo "$COUNT" \
                | tr -d '[:space:]'
            )

            if [ "$COUNT" -ne 1 ]; then
              echo "::error::README.md must reference $reference exactly once; found $COUNT."
              exit 1
            fi
          done

          PROFILE_USERNAME=$(
            node scripts/github-analytics-config.mjs \
              --print-profile-username
          )

          if ! grep -Fq \
            "hits.sh/github.com/${PROFILE_USERNAME}.svg" \
            README.md; then
            echo "::error::README.md is missing the configured profile-view badge."
            exit 1
          fi

          # Final target validation proves README generation did not mutate or
          # introduce files beneath assets/.
          node scripts/manage-analytics-assets.mjs validate-assets

          echo "README analytics section replaced without duplicates."

      - name: Commit and push refreshed analytics
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          # -A records deletion of every old asset and addition of the freshly
          # generated replacement directory.
          git add -A assets README.md

          if git diff --cached --quiet; then
            echo "Analytics and README are unchanged. Nothing to commit."
            exit 0
          fi

          git commit -m "chore(stats): refresh GitHub analytics"

          if ! git push; then
            echo "Initial push failed. Rebasing onto the latest branch..."
            git pull --rebase
            git push
          fi
