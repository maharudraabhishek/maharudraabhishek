name: Update GitHub Analytics

on:
  schedule:
    # Runs daily at 02:17 UTC.
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-engineering-analytics
  cancel-in-progress: true

jobs:
  generate:
    name: Generate GitHub analytics
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate required scripts
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_SCRIPTS=(
            "scripts/generate-engineering-analytics.mjs"
            "scripts/update-readme-analytics.mjs"
            "scripts/ai-engineering-analytics.mjs"
          )

          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if [ ! -f "$script" ]; then
              echo "::error::$script is missing from the repository."
              exit 1
            fi

            node --check "$script"
            echo "Validated: $script"
          done

      - name: Validate private GitHub token
        shell: bash
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
          GITHUB_USERNAME: maharudraabhishek
        run: |
          set -euo pipefail

          if [ -z "${PRIVATE_STATS_TOKEN:-}" ]; then
            echo "::error::PRIVATE_STATS_TOKEN is missing."
            exit 1
          fi

          STATUS=$(curl \
            --silent \
            --show-error \
            --output /tmp/github-user.json \
            --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $PRIVATE_STATS_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)

          if [ "$STATUS" != "200" ]; then
            echo "::error::GitHub rejected PRIVATE_STATS_TOKEN with HTTP $STATUS."
            cat /tmp/github-user.json
            exit 1
          fi

          AUTHENTICATED_LOGIN=$(node -e \
            "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('/tmp/github-user.json','utf8')); process.stdout.write(data.login ?? '')")

          if [ "${AUTHENTICATED_LOGIN,,}" != "${GITHUB_USERNAME,,}" ]; then
            echo "::error::PRIVATE_STATS_TOKEN belongs to '$AUTHENTICATED_LOGIN', not '$GITHUB_USERNAME'."
            exit 1
          fi

          echo "GitHub authentication succeeded for $AUTHENTICATED_LOGIN."

      - name: Generate analytics into a temporary directory
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
          PUBLIC_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: maharudraabhishek

          # Historical GitHub usernames used for public work attribution.
          # Add future aliases as a comma-separated list. The generator merges
          # matching repositories and deduplicates commits by SHA.
          CONTRIBUTOR_ALIASES: abkumar

          # Includes all repositories owned by the profile user and public
          # repositories GitHub links to the user through commits, pull
          # requests, or pull-request reviews. External private/internal
          # repositories are excluded.
          REPOSITORY_AFFILIATIONS: owner,collaborator,organization_member
          MAX_REPOSITORIES: "500"
          MAX_PUBLIC_CONTRIBUTED_REPOSITORIES: "100"
          REPOSITORY_CONCURRENCY: "3"
          MANIFEST_CONCURRENCY: "2"
          MAX_MANIFEST_FILES_PER_REPOSITORY: "80"

          CODE_ACTIVITY_YEARS: "10"
          MAX_COMMITS_PER_REPOSITORY: "250"
          MAX_ANALYZED_COMMITS: "2500"
          COMMIT_LIST_CONCURRENCY: "2"
          COMMIT_DETAIL_CONCURRENCY: "3"

          INCLUDE_ARCHIVED_REPOSITORIES: "true"
          INCLUDE_FORKED_REPOSITORIES: "false"
          EXCLUDE_REPOSITORIES: maharudraabhishek/maharudraabhishek
          MIN_SCAN_SUCCESS_RATIO: "0.75"

          OUTPUT_DIRECTORY: generated-analytics
          DEBUG_PRIVATE_REPOSITORIES: "false"
        run: |
          set -euo pipefail

          rm -rf generated-analytics
          mkdir -p generated-analytics

          node scripts/generate-engineering-analytics.mjs

      - name: Validate generated SVG cards
        shell: bash
        run: |
          set -euo pipefail

          SVG_FILES=(
            "github-overview.svg"
            "github-trophies.svg"
            "contribution-streak.svg"
            "contribution-graph.svg"
            "github-activity-graph.svg"
            "personal-code-contribution.svg"
            "language-spectrum.svg"
            "public-contribution-portfolio.svg"
            "frameworks-platforms.svg"
            "engineering-domains.svg"
            "delivery-collaboration.svg"
            "repository-portfolio.svg"
            "ai-engineering-overview.svg"
            "agentic-workflow-maturity.svg"
            "ai-engineering-capabilities.svg"
            "mcp-tool-integration.svg"
            "context-governance.svg"
            "ai-workflow-activity.svg"
            "ai-engineering-trophies.svg"
          )

          for filename in "${SVG_FILES[@]}"; do
            svg="generated-analytics/$filename"

            if [ ! -s "$svg" ]; then
              echo "::error::$svg is missing or empty."
              exit 1
            fi

            if ! grep -q "<svg" "$svg"; then
              echo "::error::$svg does not contain SVG markup."
              exit 1
            fi

            if grep -qiE \
              "github_pat_|ghp_|PRIVATE_STATS_TOKEN|Authorization: Bearer" \
              "$svg"; then
              echo "::error::Potential secret material was found in $svg."
              exit 1
            fi

            echo "Validated: $svg"
          done

      - name: Replace repository analytics cards
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p assets

          CURRENT_SVG_FILES=(
            "github-overview.svg"
            "github-trophies.svg"
            "contribution-streak.svg"
            "contribution-graph.svg"
            "github-activity-graph.svg"
            "personal-code-contribution.svg"
            "language-spectrum.svg"
            "public-contribution-portfolio.svg"
            "frameworks-platforms.svg"
            "engineering-domains.svg"
            "delivery-collaboration.svg"
            "repository-portfolio.svg"
            "ai-engineering-overview.svg"
            "agentic-workflow-maturity.svg"
            "ai-engineering-capabilities.svg"
            "mcp-tool-integration.svg"
            "context-governance.svg"
            "ai-workflow-activity.svg"
            "ai-engineering-trophies.svg"
          )

          LEGACY_SVG_FILES=(
            "github-languages.svg"
            "activity-timeline.svg"
            "engineering-trophies.svg"
            "open-source-stewardship.svg"
          )

          # Remove every current and legacy managed card before installing the
          # validated new set. Unrelated SVG assets are not touched.
          for filename in "${CURRENT_SVG_FILES[@]}" "${LEGACY_SVG_FILES[@]}"; do
            rm -f "assets/$filename"
          done

          for filename in "${CURRENT_SVG_FILES[@]}"; do
            install -m 0644 "generated-analytics/$filename" "assets/$filename"
          done

          echo "Fresh analytics cards installed:"
          ls -lh assets/*.svg

      - name: Replace profile README analytics section
        shell: bash
        env:
          README_FILE: README.md
          ANALYTICS_ASSET_DIRECTORY: assets
          GITHUB_USERNAME: maharudraabhishek
        run: |
          set -euo pipefail

          node scripts/update-readme-analytics.mjs

          START_COUNT=$(grep -Fc "<!-- ENGINEERING_ANALYTICS:START -->" README.md || true)
          END_COUNT=$(grep -Fc "<!-- ENGINEERING_ANALYTICS:END -->" README.md || true)

          if [ "$START_COUNT" -ne 1 ] || [ "$END_COUNT" -ne 1 ]; then
            echo "::error::README.md must contain exactly one managed analytics block."
            exit 1
          fi

          REQUIRED_REFERENCES=(
            "assets/github-overview.svg"
            "assets/github-trophies.svg"
            "assets/contribution-streak.svg"
            "assets/contribution-graph.svg"
            "assets/github-activity-graph.svg"
            "assets/personal-code-contribution.svg"
            "assets/language-spectrum.svg"
            "assets/public-contribution-portfolio.svg"
            "assets/frameworks-platforms.svg"
            "assets/engineering-domains.svg"
            "assets/delivery-collaboration.svg"
            "assets/repository-portfolio.svg"
            "assets/ai-engineering-overview.svg"
            "assets/agentic-workflow-maturity.svg"
            "assets/ai-engineering-capabilities.svg"
            "assets/mcp-tool-integration.svg"
            "assets/context-governance.svg"
            "assets/ai-workflow-activity.svg"
            "assets/ai-engineering-trophies.svg"
          )

          for reference in "${REQUIRED_REFERENCES[@]}"; do
            COUNT=$(grep -Fo "$reference" README.md | wc -l || true)
            COUNT=$(echo "$COUNT" | tr -d '[:space:]')

            if [ "$COUNT" -ne 1 ]; then
              echo "::error::README.md must reference $reference exactly once; found $COUNT."
              exit 1
            fi
          done

          if ! grep -Fq "hits.sh/github.com/maharudraabhishek.svg" README.md; then
            echo "::error::README.md is missing the profile-view badge."
            exit 1
          fi

          echo "README analytics section replaced without duplicates."

      - name: Commit and push refreshed analytics
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A assets README.md

          if git diff --cached --quiet; then
            echo "Analytics and README are unchanged. Nothing to commit."
            exit 0
          fi

          git commit -m "chore(stats): refresh engineering analytics"

          if ! git push; then
            echo "Initial push failed. Rebasing onto the latest branch..."
            git pull --rebase
            git push
          fi
