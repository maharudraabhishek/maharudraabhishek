name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - "develop/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable pinned pnpm
        shell: bash
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build Action
        run: pnpm build

      - name: Ensure distribution was committed
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain -- dist)" ]]; then
            echo "::error::dist differs from the committed distribution. Run pnpm build."
            git status --short -- dist
            exit 1
          fi

      - name: Verify committed distribution
        run: pnpm verify:dist
