name: Update Private GitHub Stats

on:
  # Refresh the card once per day at 02:17 UTC.
  schedule:
    - cron: "17 2 * * *"

  # Allow manual execution from the GitHub Actions tab.
  workflow_dispatch:

# Required so GITHUB_TOKEN can commit the generated SVG.
permissions:
  contents: write

# Prevent two refresh jobs from pushing at the same time.
concurrency:
  group: update-private-github-stats
  cancel-in-progress: true

jobs:
  generate-private-stats:
    name: Generate private language card
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6
        with:
          # Keep credentials available so the workflow can push the SVG.
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate private GitHub token
        shell: bash
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
        run: |
          if [ -z "$PRIVATE_STATS_TOKEN" ]; then
            echo "::error::PRIVATE_STATS_TOKEN is missing."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          echo "PRIVATE_STATS_TOKEN is configured."

      - name: Verify GitHub API authentication
        shell: bash
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/github-user-response.json \
            --write-out "%{http_code}" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $PRIVATE_STATS_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::GitHub rejected PRIVATE_STATS_TOKEN with HTTP $HTTP_STATUS."
            cat /tmp/github-user-response.json
            exit 1
          fi

          echo "GitHub API authentication succeeded."

      - name: Generate private GitHub statistics
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
        run: node scripts/generate-language-stats.mjs

      - name: Validate generated SVG
        shell: bash
        run: |
          SVG_PATH="assets/github-languages.svg"

          if [ ! -f "$SVG_PATH" ]; then
            echo "::error::$SVG_PATH was not generated."
            exit 1
          fi

          if [ ! -s "$SVG_PATH" ]; then
            echo "::error::$SVG_PATH was generated but is empty."
            exit 1
          fi

          if ! grep -q "<svg" "$SVG_PATH"; then
            echo "::error::$SVG_PATH does not contain valid SVG markup."
            exit 1
          fi

          echo "Generated SVG:"
          ls -lh "$SVG_PATH"

      - name: Commit and push updated SVG
        shell: bash
        run: |
          SVG_PATH="assets/github-languages.svg"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$SVG_PATH"

          if git diff --cached --quiet; then
            echo "Language statistics have not changed. Nothing to commit."
            exit 0
          fi

          git commit -m "chore(stats): refresh private language card"
          git push
