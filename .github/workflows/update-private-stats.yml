name: Update Private GitHub Stats

on:
  # Refresh every day at 02:17 UTC.
  schedule:
    - cron: "17 2 * * *"

  # Also allow manual execution from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-private-github-stats
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate private GitHub statistics
        env:
          PRIVATE_STATS_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}
        run: node scripts/generate-language-stats.mjs

      - name: Commit updated SVG
        shell: bash
        run: |
          if git diff --quiet -- assets/github-languages.svg; then
            echo "Statistics have not changed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/github-languages.svg
          git commit -m "chore(stats): refresh private language card"
          git push
