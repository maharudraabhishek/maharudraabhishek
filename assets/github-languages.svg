<svg
  xmlns="http://www.w3.org/2000/svg"
  width="520"
  height="384"
  viewBox="0 0 520 384"
  role="img"
  aria-label="Most used GitHub languages across selected public and private repositories"
>
  <style>
    .card {
      fill: #0d1117;
      stroke: #30363d;
      stroke-width: 1;
    }

    .title {
      fill: #70a5fd;
      font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .subtitle,
    .percentage {
      fill: #8b949e;
      font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .language {
      fill: #f0f6fc;
      font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .track {
      fill: #21262d;
    }

    .bar {
      fill: #58a6ff;
    }
  </style>

  <rect class="card" x="0.5" y="0.5"
        width="519" height="383" rx="10"/>

  <text x="28" y="31" class="title">Most Used Languages</text>
  <text x="28" y="51" class="subtitle">
    Selected public + private repositories
  </text>

  
        <text x="28" y="72" class="language">JavaScript</text>
        <text x="490" y="72" text-anchor="end" class="percentage">
          56.8%
        </text>
        <rect x="160" y="59" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="59" width="170.51"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="110" class="language">TypeScript</text>
        <text x="490" y="110" text-anchor="end" class="percentage">
          19.3%
        </text>
        <rect x="160" y="97" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="97" width="57.92"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="148" class="language">Jupyter Notebook</text>
        <text x="490" y="148" text-anchor="end" class="percentage">
          12.5%
        </text>
        <rect x="160" y="135" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="135" width="37.63"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="186" class="language">Dart</text>
        <text x="490" y="186" text-anchor="end" class="percentage">
          3.1%
        </text>
        <rect x="160" y="173" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="173" width="9.27"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="224" class="language">PLpgSQL</text>
        <text x="490" y="224" text-anchor="end" class="percentage">
          2.5%
        </text>
        <rect x="160" y="211" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="211" width="7.50"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="262" class="language">HTML</text>
        <text x="490" y="262" text-anchor="end" class="percentage">
          2.1%
        </text>
        <rect x="160" y="249" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="249" width="6.26"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="300" class="language">Makefile</text>
        <text x="490" y="300" text-anchor="end" class="percentage">
          1.9%
        </text>
        <rect x="160" y="287" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="287" width="5.68"
              height="9" rx="4.5" class="bar"/>
      
        <text x="28" y="338" class="language">Java</text>
        <text x="490" y="338" text-anchor="end" class="percentage">
          1.7%
        </text>
        <rect x="160" y="325" width="300" height="9" rx="4.5"
              class="track"/>
        <rect x="160" y="325" width="5.23"
              height="9" rx="4.5" class="bar"/>
      
</svg>