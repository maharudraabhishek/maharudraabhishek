name: Generate Analytics

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub analytics
        uses: maharudraabhishek/maharudraabhishek@v1
        with:
          github-username: ${{ github.repository_owner }}
          include-private: "false"
          output-directory: assets/github-analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated analytics
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain -- assets/github-analytics README.md)" ]]; then
            echo "No analytics changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/github-analytics README.md
          git commit -m "chore: update GitHub analytics"
          git push origin "HEAD:${GITHUB_REF_NAME}"
